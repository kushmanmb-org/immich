packages:
  - cli
  - docs
  - e2e
  - open-api/typescript-sdk
  - server
  - plugins
  - web
  - .github

dedupePeerDependents: false

ignoredBuiltDependencies:
  - '@nestjs/core'
  - '@scarf/scarf'
  - '@swc/core'
  - canvas
  - core-js
  - core-js-pure
  - cpu-features
  - es5-ext
  - esbuild
  - msgpackr-extract
  - postman-code-generators
  - protobufjs
  - ssh2
  - utimes

injectWorkspacePackages: true

onlyBuiltDependencies:
  - sharp
  - '@tailwindcss/oxide'
  - bcrypt

overrides:
  ajv: ^8.18.0
  canvas: 2.11.2
  path-to-regexp: ^8.4.0
  picomatch: ^4.0.4
  sharp: ^0.34.5

packageExtensions:
  '@immich/ui':
    dependencies:
      tailwindcss: '>=4.1'
  '@photo-sphere-viewer/equirectangular-video-adapter':
    dependencies:
      three: '*'
  '@photo-sphere-viewer/video-plugin':
    dependencies:
      three: '*'
  bcrypt:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
  nestjs-kysely:
    dependencies:
      tslib: '*'
  nestjs-otel:
    dependencies:
      tslib: '*'
  sharp:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
  tailwind-variants:
    dependencies:
      tailwindcss: '>=4.1'

patchedDependencies:
  kysely@0.28.14: patches/kysely@0.28.14.patch

preferWorkspacePackages: true

shamefullyHoist: false

verifyDepsBeforeRun: install
